<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermario64</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .loading { font-size: 1.2rem; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="loading">LOADING Supermario64...</div>
    <script>
        (async () => {
            const game = 'selenite-supermario64';
            const rawBase = 'https://raw.githubusercontent.com/MemeCake789/cyan-games/main/' + game + '/';
            try {
                const response = await fetch(rawBase + 'index.html');
                let html = await response.text();
                
                // Inject <base> tag to resolve all relative assets from GitHub
                const baseTag = '<base href="' + rawBase + '">';
                if (html.includes('<head>')) {
                    html = html.replace('<head>', '<head>' + baseTag);
                } else {
                    html = baseTag + html;
                }
                
                document.open();
                document.write(html);
                document.close();
            } catch (e) {
                console.error(e);
                document.body.innerHTML = 'FAILED TO LOAD GAME. CHECK CONSOLE.';
            }
        })();
    </script>
</body>
</html>
